<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>platon-24 - GitHub Portföy</title>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --orange: #d2991d;
            --purple: #a371f7;
            --red: #f85149;
            --tab-active: #1f6feb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            padding: 16px 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area svg {
            width: 36px;
            height: 36px;
            fill: var(--text);
        }

        .logo-area h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text);
        }

        .logo-area h1 span {
            color: var(--accent);
        }

        /* ===== TAB NAVIGATION ===== */
        .tab-nav {
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 4px;
        }

        .tab-btn {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        .tab-btn.active {
            background: var(--tab-active);
            color: #fff;
        }

        .tab-btn .badge {
            background: rgba(255,255,255,0.15);
            color: inherit;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .tab-btn.active .badge {
            background: rgba(255,255,255,0.25);
        }

        /* ===== MAIN ===== */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .tab-content {
            display: none;
            animation: fadeSlide 0.35s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== HOME TAB ===== */
        .profile-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 32px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--border);
            margin-bottom: 20px;
        }

        .profile-card h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .profile-card .bio {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .stat-num {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-item .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .quick-link-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .quick-link-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .quick-link-card .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .icon-circle.github  { background: rgba(88,166,255,0.15); color: var(--accent); }
        .icon-circle.pages   { background: rgba(63,185,80,0.15);  color: var(--green); }
        .icon-circle.code    { background: rgba(163,113,247,0.15); color: var(--purple); }

        /* ===== REPO CARDS ===== */
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .count {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .repo-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .repo-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }

        .repo-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .repo-card h3 a {
            color: var(--accent);
            text-decoration: none;
        }

        .repo-card h3 a:hover {
            text-decoration: underline;
        }

        .repo-card .repo-desc {
            color: var(--text-secondary);
            font-size: 0.88rem;
            margin-bottom: 16px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .repo-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .repo-meta .lang-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            vertical-align: middle;
        }

        .repo-meta svg {
            vertical-align: middle;
            margin-right: 4px;
        }

        .repo-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }

        .pages-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(63,185,80,0.12);
            color: var(--green);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .pages-link:hover {
            background: rgba(63,185,80,0.22);
        }

        .pages-link svg {
            width: 16px;
            height: 16px;
        }

        /* ===== PAGES TAB ===== */
        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .page-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            transition: all 0.2s ease;
            text-decoration: none;
            color: var(--text);
            display: block;
        }

        .page-card:hover {
            border-color: var(--green);
            box-shadow: 0 4px 20px rgba(63,185,80,0.12);
            transform: translateY(-2px);
        }

        .page-card .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(63,185,80,0.15);
            color: var(--green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .page-card .live-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        .page-card h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: var(--accent);
        }

        .page-card p {
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .page-card .page-url {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'SF Mono', 'Fira Code', monospace;
            word-break: break-all;
        }

        /* ===== LOADING & EMPTY ===== */
        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .error-state {
            background: rgba(248,81,73,0.1);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: var(--red);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 32px 24px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }

            .tab-nav {
                width: 100%;
                overflow-x: auto;
            }

            .tab-btn {
                white-space: nowrap;
            }

            .profile-card {
                padding: 24px;
            }

            .repo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="header-inner">
        <div class="logo-area">
            <svg viewBox="0 0 16 16" aria-hidden="true">
                <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>

<!-- ===== MAIN ===== -->

    <!-- HOME TAB -->
    <section class="tab-content active" id="tab-home">

                <div class="stat-item">

        <div class="quick-links">

                <div class="icon-circle github">🐙</div>

                    <strong>GitHub Profili</strong>

            <a class="quick-link-card" href="#" id="pagesQuickLink">

                <div class="icon-circle code">💻</div>

                    <strong>Tüm Repolar</strong>

    <!-- REPOS TAB -->
    <section class="tab-content" id="tab-repos">

            <div class="loading-spinner"><div class="spinner"></div></div>

    <!-- PAGES TAB -->
    <section class="tab-content" id="tab-pages">
        <div class="section-title">
            🌐 GitHub Pages ile Yayında <span class="count" id="pagesCountLabel"></span>

</main>

<footer>
    © 2026 <a href="https://github.com/platon-24" target="_blank" rel="noopener">platon-24</a> ·
    <a href="https://github.com/platon-24" target="_blank" rel="noopener">GitHub</a> ile ✨
</footer>

<script>
// ===== CONFIGURATION =====
const GITHUB_USERNAME = 'platon-24';
const GITHUB_API = `https://api.github.com/users/${GITHUB_USERNAME}`;
const REPOS_API = `https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&sort=updated`;

// ===== KNOWN GITHUB PAGES (manuel olarak eklenen) =====
const KNOWN_PAGES = [
    { name: 'Overlay-Watermark', url: 'https://platon-24.github.io/Overlay-Watermark/' },
    { name: 'kolay-photo',       url: 'https://platon-24.github.io/kolay-photo/' },
    { name: 'video-quick',       url: 'https://platon-24.github.io/video-quick/' },
];

// ===== STATE =====
let allRepos = [];
let pagesRepos = [];

// ===== TAB SWITCHING =====
function switchTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

    const btn = document.querySelector(`[data-tab="${tabName}"]`);
    const content = document.getElementById(`tab-${tabName}`);

    if (btn) btn.classList.add('active');
    if (content) content.classList.add('active');
}

document.getElementById('tabNav').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    switchTab(btn.dataset.tab);
});

// Make switchTab globally accessible for inline handlers
window.switchTab = switchTab;

// ===== LANGUAGE COLORS =====
const langColors = {
    'JavaScript': '#f1e05a', 'TypeScript': '#3178c6', 'Python': '#3572A5',
    'HTML': '#e34c26', 'CSS': '#563d7c', 'Java': '#b07219',
    'C#': '#178600', 'C++': '#f34b7d', 'C': '#555555',
    'Go': '#00ADD8', 'Rust': '#dea584', 'Ruby': '#701516',
    'PHP': '#4F5D95', 'Swift': '#F05138', 'Kotlin': '#A97BFF',
    'Dart': '#00B4AB', 'Shell': '#89e051', 'Vue': '#41b883',
    'SCSS': '#c6538c', 'Jupyter Notebook': '#DA5B0B',
};

function getLangColor(lang) {
    return langColors[lang] || '#8b949e';
}

// ===== ICONS (SVG) =====
function starIcon() {
    return `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>`;
}

function forkIcon() {
    return `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878a2.25 2.25 0 10-1.5 0zM3.75 3.5a.75.75 0 100 1.5.75.75 0 000-1.5zm8.5 0a.75.75 0 100 1.5.75.75 0 000-1.5zM5 11.378v-.878a.75.75 0 011.5 0v.878a2.25 2.25 0 11-1.5 0zM3.75 13a.75.75 0 100 1.5.75.75 0 000-1.5zm8.5-1.5a.75.75 0 100 1.5.75.75 0 000-1.5z"/></svg>`;
}

function globeIcon() {
    return `<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0z"/></svg>`;
}

function linkIcon() {
    return `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.83 0z"/></svg>`;
}

// ===== CHECK GITHUB PAGES =====
async function checkGitHubPages(repoName) {
    try {
        const resp = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${repoName}/pages`);
        if (resp.status === 200) {
            const data = await resp.json();
            return {
                enabled: true,
                url: data.html_url || `https://${GITHUB_USERNAME}.github.io/${repoName}/`,
            };
        }
        return { enabled: false, url: null };
    } catch {
        return { enabled: false, url: null };
    }
}

// ===== FORMAT DATE =====
function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    const now = new Date();
    const diff = now - d;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    if (days === 0) return 'Bugün';
    if (days === 1) return 'Dün';
    if (days < 30) return `${days} gün önce`;
    if (days < 365) return `${Math.floor(days / 30)} ay önce`;
    return `${Math.floor(days / 365)} yıl önce`;
}

// ===== RENDER FUNCTIONS =====
function renderRepoCard(repo, hasPages, pagesUrl) {
    const langColor = getLangColor(repo.language);
    const topics = (repo.topics || []).slice(0, 3);
    const updated = formatDate(repo.updated_at);

    let pagesLinkHTML = '';
    if (hasPages && pagesUrl) {
        pagesLinkHTML = `
            <a href="${pagesUrl}" target="_blank" rel="noopener" class="pages-link" title="GitHub Pages'te canlı">
                ${globeIcon()} Canlı Site
            </a>`;
    }

    return `
        <div class="repo-card">
            <h3>
                <a href="${repo.html_url}" target="_blank" rel="noopener">${repo.name}</a>
                ${repo.archived ? '<span style="color:var(--text-secondary);font-size:0.7rem;background:var(--bg-card);padding:2px 8px;border-radius:4px;margin-left:8px;">Arşiv</span>' : ''}
            </h3>
            <p class="repo-desc">${repo.description || 'Açıklama yok'}</p>
            <div class="repo-meta">
                ${repo.language ? `<span><span class="lang-dot" style="background:${langColor}"></span>${repo.language}</span>` : ''}
                ${repo.stargazers_count > 0 ? `<span>${starIcon()} ${repo.stargazers_count}</span>` : ''}
                ${repo.forks_count > 0 ? `<span>${forkIcon()} ${repo.forks_count}</span>` : ''}
                ${topics.length > 0 ? topics.map(t => `<span style="color:var(--accent);font-size:0.75rem;">#${t}</span>`).join(' ') : ''}
            </div>
            <div class="repo-footer">
                <span style="font-size:0.75rem;color:var(--text-secondary);">🕐 ${updated}</span>
                ${pagesLinkHTML}
            </div>
        </div>`;
}

function renderPageCard(repo, pagesUrl) {
    return `
        <a href="${pagesUrl}" target="_blank" rel="noopener" class="page-card">
            <div class="live-badge">
                <span class="live-dot"></span> CANLI
            </div>
            <h3>${repo.name}</h3>
            <p>${repo.description || 'Açıklama yok'}</p>
            <div class="page-url">${linkIcon()} ${pagesUrl}</div>
            ${repo.language ? `<div style="margin-top:12px;font-size:0.8rem;color:var(--text-secondary);">
                <span class="lang-dot" style="background:${getLangColor(repo.language)}"></span> ${repo.language}
            </div>` : ''}
        </a>`;
}

function renderEmptyRepos() {

        <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 16 16" fill="currentColor" opacity="0.3">
                <path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8z"/>
            </svg>
            <p>Henüz açık repo bulunamadı.</p>
        </div>`;
}

        <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 16 16" fill="currentColor" opacity="0.3">
                <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <p>GitHub Pages ile yayınlanan repo bulunamadı.</p>
            <p style="font-size:0.85rem;margin-top:8px;">
                Bir repoyu yayınlamak için: Settings → Pages → Source → Deploy from a branch
            </p>

// ===== MAIN DATA LOADING =====
async function loadData() {
    try {
        // Fetch user profile
        const userResp = await fetch(GITHUB_API);
        const userData = await userResp.json();

        // Update home tab
        document.getElementById('userName').textContent = userData.name || `@${GITHUB_USERNAME}`;
        document.getElementById('userBio').textContent = userData.bio || 'GitHub\'da açık kaynak projeler';
        if (userData.avatar_url) {
            document.getElementById('userAvatar').src = userData.avatar_url;
            document.getElementById('userAvatar').style.display = '';
        }
        document.getElementById('statRepos').textContent = userData.public_repos || 0;

        // Fetch repos
        const reposResp = await fetch(REPOS_API);
        allRepos = await reposResp.json();

        if (!Array.isArray(allRepos)) {
            throw new Error('Repo verisi alınamadı');
        }

        // Sort: non-archived first, then by updated date
        allRepos.sort((a, b) => {
            if (a.archived !== b.archived) return a.archived ? 1 : -1;
            return new Date(b.updated_at) - new Date(a.updated_at);
        });

        // Update counts
        const totalStars = allRepos.reduce((sum, r) => sum + r.stargazers_count, 0);
        document.getElementById('statStars').textContent = totalStars;
        document.getElementById('repoCount').textContent = allRepos.length;
        document.getElementById('repoCountLabel').textContent = `(${allRepos.length} repo)`;

        // Render repos tab
        const repoGrid = document.getElementById('repoGrid');
        if (allRepos.length === 0) {
            repoGrid.innerHTML = renderEmptyRepos();

            // Still show known pages if any (reposuz da olsa)
            const pagesGrid = document.getElementById('pagesGrid');
            if (KNOWN_PAGES.length > 0) {
                pagesGrid.innerHTML = KNOWN_PAGES.map(kp => {
                    const nameParts = kp.name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                    return `
                        <a href="${kp.url}" target="_blank" rel="noopener" class="page-card">
                            <div class="live-badge">
                                <span class="live-dot"></span> CANLI
                            </div>
                            <h3>${kp.name}</h3>
                            <p>GitHub Pages ile yayında</p>
                            <div class="page-url">${linkIcon()} ${kp.url}</div>
                        </a>`;
                }).join('');
                document.getElementById('statPages').textContent = KNOWN_PAGES.length;
                document.getElementById('pagesCount').textContent = KNOWN_PAGES.length;
                document.getElementById('pagesCountLabel').textContent = `(${KNOWN_PAGES.length} site)`;
                document.getElementById('pagesQuickLink').href = '#';
                document.getElementById('pagesQuickLink').setAttribute('onclick', "switchTab('pages');return false;");
            } else {
                pagesGrid.innerHTML = renderEmptyPages();
            }
        } else {
            // First render repo cards without pages info
            repoGrid.innerHTML = allRepos.map(r => renderRepoCard(r, false, null)).join('');

            // Then check GitHub Pages for each repo (in parallel, with rate limiting)
            const pagesChecks = allRepos.map(async (repo, index) => {
                try {
                    // Small delay between requests to avoid rate limiting
                    await new Promise(r => setTimeout(r, index * 100));
                    const result = await checkGitHubPages(repo.name);
                    if (result.enabled) {
                        pagesRepos.push({ repo, url: result.url });
                        // Update the specific card
                        const cards = repoGrid.querySelectorAll('.repo-card');
                        if (cards[index]) {
                            cards[index].outerHTML = renderRepoCard(repo, true, result.url);
                        }
                    }
                } catch {
                    // Silently skip failed pages checks
                }
                return null;
            });

            await Promise.all(pagesChecks);

            // Merge known pages (manuel eklenen, API'den gelmeyen)
            const existingPageNames = new Set(pagesRepos.map(p => p.repo.name));
            for (const kp of KNOWN_PAGES) {
                if (!existingPageNames.has(kp.name)) {
                    // Try to find the repo in allRepos
                    const foundRepo = allRepos.find(r => r.name === kp.name);
                    if (foundRepo) {
                        pagesRepos.push({ repo: foundRepo, url: kp.url });
                        // Update the specific card
                        const idx = allRepos.indexOf(foundRepo);
                        const cards = repoGrid.querySelectorAll('.repo-card');
                        if (cards[idx]) {
                            cards[idx].outerHTML = renderRepoCard(foundRepo, true, kp.url);
                        }
                    }
                }
            }

            // Update pages count
            document.getElementById('statPages').textContent = pagesRepos.length;
            document.getElementById('pagesCount').textContent = pagesRepos.length;
            document.getElementById('pagesCountLabel').textContent = `(${pagesRepos.length} site)`;

            // Render pages tab
            const pagesGrid = document.getElementById('pagesGrid');
            if (pagesRepos.length === 0) {
                pagesGrid.innerHTML = renderEmptyPages();
            } else {
                pagesGrid.innerHTML = pagesRepos.map(p => renderPageCard(p.repo, p.url)).join('');
            }

            // Quick link for pages
            if (pagesRepos.length > 0) {
                document.getElementById('pagesQuickLink').href = '#';
                document.getElementById('pagesQuickLink').setAttribute('onclick', "switchTab('pages');return false;");
            }
        }
    } catch (err) {
        console.error('Veri yüklenirken hata:', err);
        document.getElementById('repoGrid').innerHTML = `
            <div class="error-state" style="grid-column:1/-1;">
                ⚠️ Veri yüklenirken bir hata oluştu. GitHub API limitine takılmış olabilirsiniz. Lütfen daha sonra tekrar deneyin.
            </div>`;
        document.getElementById('userBio').textContent = 'Veri yüklenemedi.';

        // Hata durumunda da bilinen Pages linklerini göster
        const pagesGrid = document.getElementById('pagesGrid');
        if (KNOWN_PAGES.length > 0) {
            pagesGrid.innerHTML = KNOWN_PAGES.map(kp => `
                <a href="${kp.url}" target="_blank" rel="noopener" class="page-card">
                    <div class="live-badge">
                        <span class="live-dot"></span> CANLI
                    </div>
                    <h3>${kp.name}</h3>
                    <p>GitHub Pages ile yayında</p>
                    <div class="page-url">${linkIcon()} ${kp.url}</div>
                </a>`).join('');
            document.getElementById('statPages').textContent = KNOWN_PAGES.length;
            document.getElementById('pagesCount').textContent = KNOWN_PAGES.length;
            document.getElementById('pagesCountLabel').textContent = `(${KNOWN_PAGES.length} site)`;
            document.getElementById('pagesQuickLink').href = '#';
            document.getElementById('pagesQuickLink').setAttribute('onclick', "switchTab('pages');return false;");
        } else {
            pagesGrid.innerHTML = '';
        }
    }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', loadData);
</script>
